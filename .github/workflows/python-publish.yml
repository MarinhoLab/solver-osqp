name: Build and Upload Python Packages

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ['ubuntu-latest','ubuntu-24.04-arm']
        python-version: ['3.12','3.13']

    steps:
      - uses: actions/checkout@v3
      - name: init submodules
        run: |
          git submodule update --init --recursive
          git fetch --prune --unshallow
      - name: Set up Python ${{ matrix.python-version }} (Github Hosted VMs)
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}
      - name: configure (Ubuntu)
        if: startsWith(matrix.os,'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install libeigen3-dev
      - name: build
        run: |
          ls -R
          python -m pip config set global.break-system-packages true
          python -m pip install --upgrade pip
          python -m pip install setuptools wheel setuptools-git-versioning
          python setup.py bdist_wheel
      - name: Rename wheel (Ubuntu Only)
        if: startsWith(matrix.os,'ubuntu')
        run: |
          sudo apt-get install rename
          cd dist
          ls -lah
          rename 's/linux/manylinux2014/' *
          cd ..
          cd ..
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: debian-packages-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/


  upload:
      needs: build
      runs-on: ubuntu-latest
      permissions:
        id-token: write
      steps:
        - uses: actions/download-artifact@v4 # Download all artifacts
          with:
            path: dist/
            merge-multiple: true
        - name: Publish package distributions to PyPI
          uses: pypa/gh-action-pypi-publish@release/v1
